name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Step 1: Package game.love ───────────────────────────────────────────────
  build-love:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package .love file
        run: |
          zip -9 -r game.love . \
            -x ".git/*" ".github/*" "build/*" "main_backup.lua" ".gitignore" "*.md"

      - name: Upload .love artifact
        uses: actions/upload-artifact@v4
        with:
          name: game-love
          path: game.love

  # ─── Step 2: Windows ──────────────────────────────────────────────────────────
  build-windows:
    needs: build-love
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download .love
        uses: actions/download-artifact@v4
        with:
          name: game-love

      - name: Build Windows
        uses: love-actions/love-actions-windows@v1
        with:
          love-package: ./game.love
          product-name: break-tetris
          love-ref: 11.3
          output-folder: build/windows

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-windows
          path: build/windows/*.zip

  # ─── Step 3: Linux AppImage ───────────────────────────────────────────────────
  build-linux:
    needs: build-love
    runs-on: ubuntu-latest
    steps:
      - name: Download .love
        uses: actions/download-artifact@v4
        with:
          name: game-love

      - name: Build Linux AppImage (Manual)
        run: |
          # 安裝工具
          sudo apt-get install -y libfuse2 || true

          # 下載 LÖVE AppImage
          wget -q https://github.com/love2d/love/releases/download/11.3/love-11.3-x86_64.AppImage
          chmod +x love-11.3-x86_64.AppImage

          # 解壓 AppImage 為 squashfs-root
          ./love-11.3-x86_64.AppImage --appimage-extract

          # 放入遊戲資源
          cp game.love squashfs-root/

          # 修改 AppRun 讓其啟動時自動載入 game.love
          echo '#!/bin/sh' > squashfs-root/AppRun
          echo 'SELF=$(readlink -f "$0")' >> squashfs-root/AppRun
          echo 'HERE=${SELF%/*}' >> squashfs-root/AppRun
          echo 'exec "$HERE/love" "$HERE/game.love" "$@"' >> squashfs-root/AppRun
          chmod +x squashfs-root/AppRun

          # 重新打包成新 AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage
          ./appimagetool-x86_64.AppImage squashfs-root break-tetris-x86_64.AppImage

          mkdir -p build/linux
          mv break-tetris-x86_64.AppImage build/linux/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-linux
          path: build/linux/*.AppImage

  # ─── Step 4: macOS (Manual, no signing) ──────────────────────────────────────
  build-macos:
    needs: build-love
    runs-on: ubuntu-latest
    steps:
      - name: Download .love
        uses: actions/download-artifact@v4
        with:
          name: game-love

      - name: Build macOS
        run: |
          wget -q https://github.com/love2d/love/releases/download/11.3/love-11.3-macos.zip
          unzip -q love-11.3-macos.zip
          cp game.love love.app/Contents/Resources/
          mv love.app break-tetris.app
          mkdir -p build/macos
          zip -9 -y -r build/macos/break-tetris-macos.zip break-tetris.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-macos
          path: build/macos/*.zip

  # ─── Step 5: Create GitHub Release ───────────────────────────────────────────
  release:
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Download .love for release
        uses: actions/download-artifact@v4
        with:
          name: game-love
          path: dist/game-love

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          body_path: docs/release_template.md
          files: |
            dist/build-windows/*.zip
            dist/build-linux/*.AppImage
            dist/build-macos/*.zip
            dist/game-love/game.love
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
