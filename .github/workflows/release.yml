name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build for all platforms
        uses: love-actions/love-actions@v1
        with:
          game_name: break-tetris
          version: 11.3
          platforms: windows, macos, linux

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/windows/*.zip
            build/macos/*.zip
            build/linux/*.AppImage
            build/love/*.love
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
